<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Two Fields Form</title>
</head>
<body>

    <!-- 1. The HTML Form Configuration -->
    <!-- Leaving action empty sends the data back to this exact same file -->
    <form action="" method="POST">
        
        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username" required><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <button type="submit" name="submit_form">Submit Information</button>
    </form>

    <hr>

    <!-- 2. The PHP Processing Block -->
    <?php
    // Check if the form has been submitted
    if (isset($_POST['submit_form'])) {
        
        // Collect and clean user input to prevent basic security exploits
        $user_name  = htmlspecialchars($_POST['username']);
        $user_email = htmlspecialchars($_POST['email']);

        // Display the data back onto the screen
        echo "<h3>Submitted Data:</h3>";
        echo "<strong>Username:</strong> " . $user_name . "<br>";
        echo "<strong>Email:</strong> " . $user_email . "<br>";
    }
    ?>

</body>
</html>
