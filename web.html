<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Web Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #333;
      text-align: center;
    }

    header {
      background-color: #0078d7;
      color: white;
      padding: 20px;
    }

    main {
      padding: 40px 20px;
    }

    button {
      background-color: #0078d7;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #005fa3;
    }
  </style>
</head>
<body>
  <header>
    <h1>vanakkam</h1>
  </header>

  <main>
    <p>please enter.</p>
    <button onclick="showMessage()">enter</button>
    <p id="message"></p>
  </main>

  <script>
    function showMessage() {
      document.getElementById("message").textContent = "welcome everybody.";
    }
  </script>
</body>
</html>
